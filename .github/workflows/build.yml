name: Build Obsidia ISO

# Trigger the workflow on every push to any branch
on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    name: Compile and Package ISO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install the Zig compiler 
      # (Using 0.13.0, but you can change this to 'master' if you want bleeding edge)
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      # We need xorriso and mtools to assemble the bootable disk image
      - name: Install ISO Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools

      # Pull the Limine binaries and compile the installer utility
      - name: Fetch Limine Binaries
        run: |
          git clone https://github.com/limine-bootloader/limine.git --branch=v8.x-binary --depth=1
          make -C limine

      - name: Build Zig Kernel
        run: zig build

      - name: Assemble Bootable ISO
        run: |
          set -euo pipefail

          mkdir -p iso_root/boot
          cp zig-out/bin/kernel.elf iso_root/boot/
          cp limine.conf iso_root/

          # Bootloader copy in the ISO tree itself (path #2)
          mkdir -p iso_root/EFI/BOOT
          cp limine/BOOTX64.EFI iso_root/EFI/BOOT/BOOTX64.EFI

          # Build the FAT EFI System Partition (path #1)
          dd if=/dev/zero of=efi.img bs=1M count=4
          mformat -i efi.img -F ::
          mmd   -i efi.img ::/EFI
          mmd   -i efi.img ::/EFI/BOOT
          mcopy -i efi.img limine/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI

          echo "=== ESP contents ==="
          mdir -i efi.img ::/EFI/BOOT

          cp efi.img iso_root/boot/efi.img

          xorriso -as mkisofs \
            -R -J \
            -e boot/efi.img \
            -no-emul-boot \
            -efi-boot-part --efi-boot-image \
            -append_partition 2 0xef efi.img \
            -o obsidia.iso \
            iso_root

          echo "=== ISO boot info ==="
          xorriso -indev obsidia.iso -report_el_torito plain 2>&1 | grep -i efi || true

      - name: Verify Kernel Boot
        run: |
          sudo apt-get install -y qemu-system-x86 ovmf

          # Pick the PLAIN OVMF (avoid .ms / .secboot Secure Boot variants)
          OVMF_CODE=$(ls /usr/share/OVMF/OVMF_CODE_4M.fd \
                         /usr/share/OVMF/OVMF_CODE.fd 2>/dev/null | head -n1)
          OVMF_VARS_SRC=$(ls /usr/share/OVMF/OVMF_VARS_4M.fd \
                             /usr/share/OVMF/OVMF_VARS.fd 2>/dev/null | head -n1)

          if [ -z "$OVMF_CODE" ] || [ -z "$OVMF_VARS_SRC" ]; then
            echo "::error::Could not find plain OVMF firmware."
            ls -la /usr/share/OVMF/ || true
            exit 1
          fi

          # VARS must be writable, so copy it out of the read-only system path
          cp "$OVMF_VARS_SRC" /tmp/OVMF_VARS.fd
          echo "Using OVMF code: $OVMF_CODE"

          set +e
          timeout 30s qemu-system-x86_64 \
            -M q35 -m 512M \
            -drive if=pflash,format=raw,unit=0,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,unit=1,file=/tmp/OVMF_VARS.fd \
            -drive id=obsidia,file=obsidia.iso,format=raw,if=none \
            -device qemu-xhci \
            -device usb-storage,drive=obsidia,bootindex=0 \
            -serial stdio \
            -display none \
            -no-reboot \
            -d guest_errors \
            2>&1 | tee boot.log
          set -e

          echo "::group::Boot log"
          cat boot.log
          echo "::endgroup::"

          if grep -q "BOOT_OK" boot.log; then
            echo "Kernel reached stable state."
          else
            echo "::error::Boot marker 'BOOT_OK' not found — kernel did not boot cleanly."
            exit 1
          fi

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: boot.log
          if-no-files-found: warn
          
      # Attach the final obsidia.iso to the GitHub Actions run
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidia-os
          path: obsidia.iso
          if-no-files-found: error
