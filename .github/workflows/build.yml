name: Build & Test Obsidia

# Trigger on pushes to main (post-merge) and on pull requests. Feature
# branches are covered by the pull_request event, so scoping push to main
# avoids the duplicate run a push-to-any-branch + pull_request pair produced
# on every PR commit.
on:
  push:
    branches: [ main ]
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref, so a
# rebase/force-push doesn't leave a stale build burning a runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    name: Build, test, package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin Zig to the version the project targets.
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      # Cache the downloaded .deb packages so we don't re-fetch them from the apt
      # mirrors every run (that download was the slowest step, ~18 min on a slow
      # mirror). On a cache hit the .debs are already in /var/cache/apt/archives
      # and the install step below uses them without hitting the network. Bump the
      # "-v1" key suffix to invalidate the cache when the package set changes.
      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-tooling-v1

      # Everything the test harness needs: ISO assembly (xorriso/mtools), emulation
      # (qemu + ovmf), and the framebuffer screenshot check (socat + imagemagick).
      # --no-install-recommends skips qemu-system-x86's large recommended GUI stack
      # (GTK/SDL/...) that we never use — CI runs headless (-display none); the BIOS
      # firmware comes from qemu-system-data (a hard dependency) and UEFI from the
      # ovmf we install explicitly, so both boot paths still work.
      # GitHub runners ship a hook that deletes the .debs right after install; we
      # remove it and tell apt to keep them, so the cache step above can save them.
      - name: Install tooling
        run: |
          sudo rm -f /etc/apt/apt.conf.d/docker-clean
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' | sudo tee /etc/apt/apt.conf.d/99keep-debs
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xorriso mtools qemu-system-x86 ovmf socat imagemagick

      # Limine binaries + the host installer utility.
      - name: Fetch Limine binaries
        run: |
          git clone https://github.com/limine-bootloader/limine.git --branch=v8.x-binary --depth=1
          make -C limine

      # The harness builds the kernel, runs host unit tests, assembles the ISO,
      # boots it under BIOS + UEFI asserting every subsystem marker, drives the
      # shell over serial, and screenshots the framebuffer. Non-zero exit fails
      # the job (and it prints the serial log on failure).
      - name: Run test harness
        run: ./tests/run.sh

      # Attach the built ISO to the run (even on failure, if it got that far).
      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obsidia-os
          path: obsidia.iso
          if-no-files-found: warn
