name: Build & Test Obsidia

# Trigger on pushes to main (post-merge) and on pull requests. Feature
# branches are covered by the pull_request event, so scoping push to main
# avoids the duplicate run a push-to-any-branch + pull_request pair produced
# on every PR commit.
on:
  push:
    branches: [ main ]
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref, so a
# rebase/force-push doesn't leave a stale build burning a runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    name: Build, test, package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin Zig to the version the project targets.
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      # Everything the test harness needs: ISO assembly (xorriso/mtools),
      # emulation (qemu + ovmf), and the framebuffer screenshot check
      # (socat + imagemagick). These were re-downloaded from the apt mirrors on
      # every run, which took ~18 min when a mirror was slow. This action caches
      # the resolved .deb packages (keyed by the package list + the `version`
      # below), so after the first run warms the cache, later runs restore them in
      # seconds. Bump `version` to invalidate the cache (e.g. on a package change).
      - name: Install tooling (apt, cached)
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: xorriso mtools qemu-system-x86 ovmf socat imagemagick
          version: 1

      # Limine binaries + the host installer utility.
      - name: Fetch Limine binaries
        run: |
          git clone https://github.com/limine-bootloader/limine.git --branch=v8.x-binary --depth=1
          make -C limine

      # The harness builds the kernel, runs host unit tests, assembles the ISO,
      # boots it under BIOS + UEFI asserting every subsystem marker, drives the
      # shell over serial, and screenshots the framebuffer. Non-zero exit fails
      # the job (and it prints the serial log on failure).
      - name: Run test harness
        run: ./tests/run.sh

      # Attach the built ISO to the run (even on failure, if it got that far).
      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obsidia-os
          path: obsidia.iso
          if-no-files-found: warn
